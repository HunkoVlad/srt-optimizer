# Email draft configuration template.
# Copy to config/email.toml for local use.
# Keep mode as "draft" for V1. Do not enable automatic sending.
[email]
mode = "draft"

# Configure locally in config/email.toml. Do not commit real personal values.
recipient_email = "your-email@example.com"

# Optional. Leave blank if no copy recipient is needed.
cc_email = ""

# Optional text prepended to the generated report subject.
subject_prefix = ""

# Attachments are disabled for V1.
include_attachments = false

[smtp]
# SMTP sending is disabled in the example file.
enabled = false

# Gmail SMTP settings for future explicit send mode.
host = "smtp.gmail.com"
port = 587

# Gmail account used for sending. recipient_email can be the same account if sending the report to yourself.
sender_email = "your-email@gmail.com"

# Store the Gmail App Password in this environment variable.
# Never store the app password in this TOML file.
password_env_var = "ALOHA_GMAIL_APP_PASSWORD"

use_tls = true

[report]
# Points to the generated email_revenue_report_<run_date>.md file.
source = "email_revenue_report"

# Email body source format for now.
format = "markdown"
